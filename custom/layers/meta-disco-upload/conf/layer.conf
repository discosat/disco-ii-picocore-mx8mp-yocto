# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes*/*/*.bb \
            ${LAYERDIR}/recipes*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-disco-upload"
BBFILE_PATTERN_meta-disco-upload = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-disco-upload = "5"

LAYERDEPENDS_meta-disco-upload = "core"
LAYERSERIES_COMPAT_meta-disco-upload = "kirkstone"
